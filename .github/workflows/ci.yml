name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Отменяем устаревшие запуски при новом пуше в ту же ветку/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Фронтенд: статическая проверка (быстро, падает первым при ошибке) ──
  web:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npx tsc -b

  # ── Бэкенд: clippy без предупреждений + тесты ──
  rust:
    name: Backend (clippy + tests)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Системные зависимости Tauri 2 (Linux). См. v2.tauri.app/start/prerequisites.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # tauri-build при компиляции проверяет наличие frontendDist (../dist),
      # поэтому сначала собираем фронт.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build frontend (produces dist/)
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test
